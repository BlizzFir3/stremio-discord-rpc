name: Build and Release

on:
  push:
    tags:
      - "v*" # Se déclenche uniquement sur les tags de type v1.0.0, v2.1.3, etc.

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    permissions:
      contents: write # Requis pour publier la release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package
        run: npm run package

      - name: Zip the binaries
        run: Compress-Archive -Path bin\* -DestinationPath stremio-discord-rpc-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: stremio-discord-rpc-windows.zip
          generate_release_notes: true
